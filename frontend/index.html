<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translingua AI</title>
    <!-- Modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar for History -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button id="newChatBtn" class="new-chat-btn">
                    <i data-lucide="plus"></i> New Translation
                </button>
            </div>
            <div class="history-container">
                <p class="history-title">Recent Translations</p>
                <div id="sidebarHistoryList" class="history-list">
                    <div id="historyLoading" class="history-loading">
                        <i data-lucide="loader-2" class="spin"></i> Loading...
                    </div>
                    <!-- History items will be injected here -->
                </div>
            </div>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="avatar"><i data-lucide="user"></i></div>
                    <span class="user-name">Offline User</span>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="main-content">
            <!-- Top Navigation (Language Selection) -->
            <header class="chat-header">
                <div class="lang-selector-container">
                    <select id="sourceLang" class="lang-select">
                        <option value="en" selected>English</option>
                        <option value="hi">Hindi</option>
                        <option value="te">Telugu</option>
                        <option value="ja">Japanese</option>
                        <option value="ko">Korean</option>
                    </select>
                    <button id="swapBtn" class="swap-btn" title="Swap Languages">
                        <i data-lucide="arrow-right-left"></i>
                    </button>
                    <select id="targetLang" class="lang-select">
                        <option value="hi" selected>Hindi</option>
                        <option value="en">English</option>
                        <option value="te">Telugu</option>
                        <option value="ja">Japanese</option>
                        <option value="ko">Korean</option>
                    </select>
                </div>
            </header>

            <!-- Chat Messages Container -->
            <div id="chatBox" class="chat-box">
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon-container">
                        <i data-lucide="languages" class="logo-icon-large"></i>
                    </div>
                    <h1>How can I translate for you today?</h1>
                </div>
                <!-- Messages will be injected here -->
            </div>

            <!-- Bottom Input Area -->
            <div class="input-area-container">
                <div class="input-box-wrapper">
                    <textarea id="chatInput" placeholder="Enter text to translate..." rows="1"></textarea>
                    <button id="sendBtn" class="send-btn" disabled>
                        <i data-lucide="send"></i>
                    </button>
                </div>
                <div class="disclaimer">
                    Translingua AI powered by Meta's NLLB Model (Offline)
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
