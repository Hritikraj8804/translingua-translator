<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translingua AI</title>
    <!-- Modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar for History -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button id="newChatBtn" class="new-chat-btn">
                    <i data-lucide="plus"></i> New Translation
                </button>
            </div>
            <div class="history-container">
                <p class="history-title">Recent Translations</p>
                <div id="sidebarHistoryList" class="history-list">
                    <div id="historyLoading" class="history-loading">
                        <i data-lucide="loader-2" class="spin"></i> Loading...
                    </div>
                    <!-- History items will be injected here -->
                </div>
            </div>
            <div class="sidebar-footer">
                <button id="settingsBtn" class="sidebar-settings-btn" title="Translation Settings">
                    <i data-lucide="settings"></i> Target Language
                </button>
                <div class="user-profile">
                    <div class="avatar"><i data-lucide="user"></i></div>
                    <span class="user-name">Offline User</span>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="main-content">
            <!-- Top Navigation -->
            <header class="chat-header">
                <div class="header-title"
                    style="display:flex; align-items:center; gap:8px; font-weight:600; font-size:1.1rem; color: var(--text-primary);">
                    <i data-lucide="bot"></i> TransLingua Matrix
                </div>
            </header>

            <!-- Settings Modal -->
            <div id="settingsModal" class="modal-overlay hidden">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3 style="margin:0; font-size:1.1rem; display:flex; align-items:center; gap:8px;"><i
                                data-lucide="settings"></i> Target Language Settings</h3>
                        <button id="closeSettingsBtn" class="close-btn"
                            style="background:transparent; border:none; color:var(--text-muted); cursor:pointer;"><i
                                data-lucide="x"></i></button>
                    </div>
                    <div class="modal-body" style="padding: 20px;">
                        <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 15px;">The Source Language
                            will be <strong>100% auto-detected</strong>. Select the language you'd like to translate TO.
                        </p>
                        <div style="margin-bottom: 8px;">
                            <label for="globalTargetLang"
                                style="display:block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px;">Always
                                Translate To:</label>
                            <select id="globalTargetLang" class="modal-dropdown-select">
                                <option value="en">English</option>
                                <option value="hi">Hindi</option>
                                <option value="te">Telugu</option>
                                <option value="ko">Korean</option>
                                <option value="ja">Japanese</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer"
                        style="padding: 15px 20px; border-top: 1px solid rgba(255,255,255,0.05); text-align: right;">
                        <button id="saveSettingsBtn"
                            style="background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 500;">Save
                            Changes</button>
                    </div>
                </div>
            </div>

            <!-- Chat Messages Container -->
            <div id="chatBox" class="chat-box">
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon-container">
                        <i data-lucide="languages" class="logo-icon-large"></i>
                    </div>
                    <h1>How can I translate for you today?</h1>
                </div>
                <!-- Messages will be injected here -->
            </div>

            <!-- Bottom Input Area -->
            <div class="input-area-container">
                <div class="input-box-wrapper">
                    <input type="file" id="fileInput" accept=".txt,.docx" style="display: none;" />
                    <button id="uploadBtn" class="upload-btn" title="Upload Document">
                        <i data-lucide="paperclip"></i>
                    </button>
                    <textarea id="chatInput" placeholder="Enter text or upload document..." rows="1"></textarea>
                    <button id="sendBtn" class="send-btn" disabled>
                        <i data-lucide="send"></i>
                    </button>
                </div>
                <div class="disclaimer">
                    Translingua AI powered by Meta's NLLB Model (Offline)
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>

</html>
